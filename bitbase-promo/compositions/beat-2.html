<template id="beat-2-template">
  <div data-composition-id="beat-2" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-2"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #070808;
        font-family: 'Inter', sans-serif;
      }
      .b2-glow {
        position: absolute;
        width: 800px;
        height: 800px;
        border-radius: 50%;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(246, 143, 21, 0.18) 0%, transparent 70%);
        filter: blur(70px);
      }
      .b2-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 200px 60px;
        gap: 50px;
        box-sizing: border-box;
      }
      .b2-logo-text {
        font-size: 90px;
        font-weight: 800;
        color: #fafafa;
        letter-spacing: -2px;
      }
      .b2-logo-dot {
        display: inline-block;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #f68f15;
        margin-left: 4px;
        vertical-align: super;
      }
      .b2-tagline {
        font-size: 52px;
        font-weight: 700;
        color: #fafafa;
        text-align: center;
        line-height: 1.3;
      }
      .b2-tagline-accent {
        color: #f68f15;
      }
      .b2-subtitle {
        font-size: 34px;
        font-weight: 400;
        color: #84888c;
        text-align: center;
      }
      .b2-divider {
        width: 120px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #f68f15, transparent);
        border-radius: 2px;
      }
    </style>

    <div class="b2-glow"></div>
    <div class="b2-content">
      <div class="b2-logo-text">Bitbase<span class="b2-logo-dot"></span></div>
      <div class="b2-divider"></div>
      <div class="b2-tagline">Your <span class="b2-tagline-accent">Base</span>.<br>Your Trust.</div>
      <div class="b2-subtitle">The exchange built for the long term</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Logo scales in with bounce
      tl.fromTo('.b2-logo-text',
        { scale: 0.6, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.45, ease: 'back.out(1.6)' }, 0.1);

      // Divider draws
      tl.fromTo('.b2-divider',
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.35, ease: 'power2.out' }, 0.4);

      // Tagline from right
      tl.fromTo('.b2-tagline',
        { x: 60, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: 'power3.out' }, 0.55);

      // Subtitle fades
      tl.fromTo('.b2-subtitle',
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.35, ease: 'power2.out' }, 0.8);

      // Glow
      tl.fromTo('.b2-glow',
        { scale: 0.6, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.2, ease: 'sine.out' }, 0);

      // Camera drift up
      tl.fromTo('.b2-content',
        { y: 15 },
        { y: -10, duration: 2.4, ease: 'none' }, 0);

      window.__timelines['beat-2'] = tl;
    </script>
  </div>
</template>
