<template id="beat-4-template">
  <div data-composition-id="beat-4" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-4"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #070808;
        font-family: 'Inter', sans-serif;
      }
      .b4-glow {
        position: absolute;
        width: 800px;
        height: 800px;
        border-radius: 50%;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(246, 143, 21, 0.15) 0%, transparent 70%);
        filter: blur(70px);
      }
      .b4-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 200px 60px;
        gap: 50px;
        box-sizing: border-box;
      }
      .b4-heading {
        font-size: 56px;
        font-weight: 700;
        color: #fafafa;
        text-align: center;
        line-height: 1.2;
      }
      .b4-cards {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
        max-width: 700px;
      }
      .b4-card {
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 32px 40px;
        border-radius: 16px;
        background: rgba(246, 143, 21, 0.06);
        border: 1px solid rgba(246, 143, 21, 0.15);
      }
      .b4-card-icon {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: rgba(246, 143, 21, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
      }
      .b4-card-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .b4-card-title {
        font-size: 34px;
        font-weight: 700;
        color: #fafafa;
      }
      .b4-card-desc {
        font-size: 22px;
        font-weight: 400;
        color: #84888c;
      }
      .b4-one-exchange {
        font-size: 36px;
        font-weight: 600;
        color: #f68f15;
        letter-spacing: 1px;
      }
    </style>

    <div class="b4-glow"></div>
    <div class="b4-content">
      <div class="b4-heading">Trade Everything.<br>One Platform.</div>
      <div class="b4-cards">
        <div class="b4-card b4-card-1">
          <div class="b4-card-icon">&#x1F4C8;</div>
          <div class="b4-card-text">
            <div class="b4-card-title">Spot Trading</div>
            <div class="b4-card-desc">BTC, ETH, SOL & 367+ pairs</div>
          </div>
        </div>
        <div class="b4-card b4-card-2">
          <div class="b4-card-icon">&#x26A1;</div>
          <div class="b4-card-text">
            <div class="b4-card-title">Futures</div>
            <div class="b4-card-desc">USDT & USDC perpetuals</div>
          </div>
        </div>
        <div class="b4-card b4-card-3">
          <div class="b4-card-icon">&#x1F30D;</div>
          <div class="b4-card-text">
            <div class="b4-card-title">TradFi</div>
            <div class="b4-card-desc">Stocks & commodities on-chain</div>
          </div>
        </div>
      </div>
      <div class="b4-one-exchange">One exchange. Everything.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Heading
      tl.fromTo('.b4-heading',
        { y: -40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: 'power3.out' }, 0.1);

      // Cards stagger from bottom
      tl.fromTo('.b4-card-1',
        { x: -50, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.35, ease: 'power3.out' }, 0.35);

      tl.fromTo('.b4-card-2',
        { x: 50, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.35, ease: 'power3.out' }, 0.55);

      tl.fromTo('.b4-card-3',
        { x: -50, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.35, ease: 'power3.out' }, 0.75);

      // One exchange tagline
      tl.fromTo('.b4-one-exchange',
        { opacity: 0, scale: 0.9 },
        { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(1.5)' }, 1.0);

      // Glow
      tl.fromTo('.b4-glow',
        { scale: 0.6, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.2, ease: 'sine.out' }, 0);

      // Camera
      tl.fromTo('.b4-content',
        { y: 20 },
        { y: -10, duration: 2.4, ease: 'none' }, 0);

      window.__timelines['beat-4'] = tl;
    </script>
  </div>
</template>
