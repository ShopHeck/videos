<template id="beat-1-template">
  <div data-composition-id="beat-1" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-1"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #070808;
        font-family: 'Inter', sans-serif;
      }
      .b1-flash {
        position: absolute;
        inset: 0;
        background: #f68f15;
        opacity: 0;
      }
      .b1-glow {
        position: absolute;
        width: 900px;
        height: 900px;
        border-radius: 50%;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(246, 143, 21, 0.3) 0%, transparent 70%);
        filter: blur(80px);
      }
      .b1-glow-2 {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(246, 143, 21, 0.15) 0%, transparent 70%);
        filter: blur(60px);
      }
      .b1-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(246, 143, 21, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(246, 143, 21, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .b1-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
        padding: 0 60px;
        box-sizing: border-box;
      }
      .b1-bonus-label {
        font-size: 48px;
        font-weight: 600;
        color: #a0a3a7;
        text-transform: uppercase;
        letter-spacing: 6px;
        margin-bottom: 20px;
      }
      .b1-amount {
        font-size: 180px;
        font-weight: 900;
        color: #f68f15;
        line-height: 1.0;
        letter-spacing: -6px;
        text-shadow: 0 0 80px rgba(246, 143, 21, 0.5);
      }
      .b1-usdt {
        font-size: 100px;
        font-weight: 800;
        color: #fafafa;
        letter-spacing: -2px;
        margin-top: 10px;
      }
      .b1-new-user {
        font-size: 42px;
        font-weight: 600;
        color: #84888c;
        margin-top: 30px;
        letter-spacing: 2px;
      }
      .b1-scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(246, 143, 21, 0.02) 3px,
          rgba(246, 143, 21, 0.02) 4px
        );
        pointer-events: none;
      }
    </style>

    <div class="b1-glow"></div>
    <div class="b1-glow-2"></div>
    <div class="b1-grid"></div>
    <div class="b1-scanlines"></div>
    <div class="b1-flash"></div>
    <div class="b1-content">
      <div class="b1-bonus-label">New User Bonus</div>
      <div class="b1-amount">$33,500</div>
      <div class="b1-usdt">USDT</div>
      <div class="b1-new-user">Claim yours now</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Orange flash on entry
      tl.fromTo('.b1-flash', { opacity: 0.9 }, { opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.05);

      // $33,500 SLAMS in from scale
      tl.fromTo('.b1-amount',
        { scale: 4, opacity: 0, rotation: -3 },
        { scale: 1, opacity: 1, rotation: 0, duration: 0.5, ease: 'expo.out' }, 0.1);

      // USDT punches up
      tl.fromTo('.b1-usdt',
        { y: 80, opacity: 0, scale: 0.7 },
        { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.8)' }, 0.35);

      // Bonus label slides down
      tl.fromTo('.b1-bonus-label',
        { y: -50, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.35, ease: 'power3.out' }, 0.5);

      // "Claim yours now"
      tl.fromTo('.b1-new-user',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }, 0.75);

      // Glow pulse
      tl.fromTo('.b1-glow',
        { scale: 0.5, opacity: 0 },
        { scale: 1.2, opacity: 1, duration: 1.4, ease: 'sine.out' }, 0);

      tl.fromTo('.b1-glow-2',
        { scale: 0.7, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.0, ease: 'sine.out' }, 0.3);

      // Camera push
      tl.fromTo('.b1-content',
        { scale: 1.0 },
        { scale: 1.05, duration: 2.4, ease: 'none' }, 0);

      window.__timelines['beat-1'] = tl;
    </script>
  </div>
</template>
