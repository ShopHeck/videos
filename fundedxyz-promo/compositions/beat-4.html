<template id="beat-4-template">
  <div data-composition-id="beat-4" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-4"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #0a0a0f;
        font-family: 'Inter', sans-serif;
      }
      .b4-glow {
        position: absolute;
        width: 800px;
        height: 800px;
        border-radius: 50%;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255, 215, 0, 0.12) 0%, transparent 70%);
        filter: blur(70px);
      }
      .b4-glow-green {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        top: 65%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(0, 212, 170, 0.15) 0%, transparent 70%);
        filter: blur(60px);
      }
      .b4-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 200px 60px;
        gap: 50px;
        box-sizing: border-box;
      }
      .b4-stat {
        text-align: center;
      }
      .b4-stat-number {
        font-size: 160px;
        font-weight: 900;
        color: #ffd700;
        letter-spacing: -4px;
        line-height: 1;
        text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
        font-variant-numeric: tabular-nums;
      }
      .b4-stat-label {
        font-size: 36px;
        font-weight: 500;
        color: #a0a0b0;
        margin-top: 8px;
      }
      .b4-stat-2 .b4-stat-number {
        color: #00d4aa;
        font-size: 140px;
        text-shadow: 0 0 60px rgba(0, 212, 170, 0.3);
      }
      .b4-payout-ticker {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 600px;
      }
      .b4-payout-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .b4-payout-name {
        font-size: 26px;
        font-weight: 500;
        color: #ffffff;
      }
      .b4-payout-amount {
        font-size: 28px;
        font-weight: 700;
        color: #00d4aa;
        font-variant-numeric: tabular-nums;
      }
    </style>

    <div class="b4-glow"></div>
    <div class="b4-glow-green"></div>
    <div class="b4-content">
      <div class="b4-stat">
        <div class="b4-stat-number">$5M+</div>
        <div class="b4-stat-label">Paid Out</div>
      </div>
      <div class="b4-stat b4-stat-2">
        <div class="b4-stat-number">5,000+</div>
        <div class="b4-stat-label">Funded Traders</div>
      </div>
      <div class="b4-payout-ticker">
        <div class="b4-payout-row b4-row-1">
          <span class="b4-payout-name">Gabriel D. &#127482;&#127480;</span>
          <span class="b4-payout-amount">$4,250</span>
        </div>
        <div class="b4-payout-row b4-row-2">
          <span class="b4-payout-name">Arjun R. &#127470;&#127475;</span>
          <span class="b4-payout-amount">$6,800</span>
        </div>
        <div class="b4-payout-row b4-row-3">
          <span class="b4-payout-name">Michael W. &#127468;&#127463;</span>
          <span class="b4-payout-amount">$8,200</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo('.b4-stat:first-child .b4-stat-number',
        { scale: 0.5, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(2)' }, 0.1);

      tl.fromTo('.b4-stat:first-child .b4-stat-label',
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.3);

      tl.fromTo('.b4-stat-2 .b4-stat-number',
        { x: 100, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: 'expo.out' }, 0.45);

      tl.fromTo('.b4-stat-2 .b4-stat-label',
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.6);

      tl.fromTo('.b4-row-1',
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.3, ease: 'power3.out' }, 0.8);

      tl.fromTo('.b4-row-2',
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.3, ease: 'power3.out' }, 0.95);

      tl.fromTo('.b4-row-3',
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.3, ease: 'power3.out' }, 1.1);

      tl.fromTo('.b4-glow',
        { scale: 0.6, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.2, ease: 'sine.out' }, 0);

      tl.fromTo('.b4-glow-green',
        { scale: 0.7, opacity: 0 },
        { scale: 1.0, opacity: 1, duration: 1.0, ease: 'sine.out' }, 0.4);

      tl.fromTo('.b4-content',
        { y: 20 },
        { y: -10, duration: 2.4, ease: 'none' }, 0);

      window.__timelines['beat-4'] = tl;
    </script>
  </div>
</template>
