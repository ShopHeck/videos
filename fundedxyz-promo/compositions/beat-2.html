<template id="beat-2-template">
  <div data-composition-id="beat-2" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-2"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #0a0a0f;
        font-family: 'Inter', sans-serif;
      }
      .b2-glow {
        position: absolute;
        width: 900px;
        height: 900px;
        border-radius: 50%;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(108, 92, 231, 0.3) 0%, transparent 70%);
        filter: blur(70px);
      }
      .b2-amount-glow {
        position: absolute;
        width: 700px;
        height: 400px;
        border-radius: 50%;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(0, 212, 170, 0.2) 0%, transparent 70%);
        filter: blur(50px);
      }
      .b2-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
        padding: 0 60px;
        box-sizing: border-box;
      }
      .b2-get-funded {
        font-size: 120px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1.1;
        letter-spacing: -2px;
        margin-bottom: 40px;
      }
      .b2-amount {
        font-size: 200px;
        font-weight: 900;
        color: #00d4aa;
        line-height: 1.0;
        letter-spacing: -6px;
        font-variant-numeric: tabular-nums;
      }
      .b2-upto {
        font-size: 36px;
        font-weight: 500;
        color: #a0a0b0;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .b2-accent-line {
        position: absolute;
        bottom: 380px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #6c5ce7, transparent);
      }
    </style>

    <div class="b2-glow"></div>
    <div class="b2-amount-glow"></div>
    <div class="b2-content">
      <div class="b2-get-funded">Get Funded.</div>
      <div class="b2-upto">UP TO</div>
      <div class="b2-amount">$200K</div>
    </div>
    <div class="b2-accent-line"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo('.b2-get-funded',
        { y: -80, opacity: 0, scale: 1.1 },
        { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'power3.out' }, 0.1);

      tl.fromTo('.b2-upto',
        { opacity: 0, letterSpacing: '12px' },
        { opacity: 1, letterSpacing: '4px', duration: 0.35, ease: 'power2.out' }, 0.35);

      tl.fromTo('.b2-amount',
        { scale: 2.5, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.5, ease: 'expo.out' }, 0.5);

      tl.fromTo('.b2-accent-line',
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.7);

      tl.fromTo('.b2-glow',
        { scale: 0.7, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.0, ease: 'sine.out' }, 0);

      tl.fromTo('.b2-amount-glow',
        { scale: 0.5, opacity: 0 },
        { scale: 1.2, opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.5);

      tl.fromTo('.b2-content',
        { y: 0 },
        { y: -15, duration: 2.4, ease: 'none' }, 0);

      window.__timelines['beat-2'] = tl;
    </script>
  </div>
</template>
