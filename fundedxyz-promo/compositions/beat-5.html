<template id="beat-5-template">
  <div data-composition-id="beat-5" data-width="1080" data-height="1920">
    <style>
      [data-composition-id="beat-5"] {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        position: relative;
        background: #0a0a0f;
        font-family: 'Inter', sans-serif;
      }
      .b5-glow-purple {
        position: absolute;
        width: 1000px;
        height: 1000px;
        border-radius: 50%;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(108, 92, 231, 0.25) 0%, transparent 70%);
        filter: blur(80px);
      }
      .b5-glow-green {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(0, 212, 170, 0.2) 0%, transparent 70%);
        filter: blur(60px);
      }
      .b5-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 200px 60px;
        gap: 50px;
        box-sizing: border-box;
      }
      .b5-keep {
        font-size: 80px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -1px;
      }
      .b5-percent {
        font-size: 280px;
        font-weight: 900;
        color: #00d4aa;
        letter-spacing: -10px;
        line-height: 0.9;
        text-shadow: 0 0 100px rgba(0, 212, 170, 0.4);
      }
      .b5-logo {
        font-size: 64px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -1px;
      }
      .b5-logo-xyz {
        color: #6c5ce7;
      }
      .b5-cta {
        padding: 28px 64px;
        border-radius: 80px;
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
        box-shadow: 0 8px 40px rgba(108, 92, 231, 0.4);
      }
      .b5-sub {
        font-size: 28px;
        font-weight: 400;
        color: #6b6b7b;
      }
    </style>

    <div class="b5-glow-purple"></div>
    <div class="b5-glow-green"></div>
    <div class="b5-content">
      <div class="b5-keep">Keep</div>
      <div class="b5-percent">90%</div>
      <div class="b5-logo">Funded<span class="b5-logo-xyz">XYZ</span></div>
      <div class="b5-cta">Start Challenge — $20</div>
      <div class="b5-sub">fundedxyz.com</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo('.b5-keep',
        { opacity: 0, y: -30 },
        { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }, 0.1);

      tl.fromTo('.b5-percent',
        { scale: 4, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.5, ease: 'expo.out' }, 0.2);

      tl.fromTo('.b5-logo',
        { y: 30, opacity: 0, scale: 0.9 },
        { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.5)' }, 0.55);

      tl.fromTo('.b5-cta',
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(2)' }, 0.8);

      tl.fromTo('.b5-sub',
        { opacity: 0 },
        { opacity: 1, duration: 0.3, ease: 'power1.out' }, 1.0);

      tl.fromTo('.b5-glow-purple',
        { scale: 0.5, opacity: 0 },
        { scale: 1.2, opacity: 1, duration: 1.5, ease: 'sine.out' }, 0);

      tl.fromTo('.b5-glow-green',
        { scale: 0.6, opacity: 0 },
        { scale: 1.1, opacity: 1, duration: 1.0, ease: 'sine.out' }, 0.2);

      tl.fromTo('.b5-percent',
        { textShadow: '0 0 100px rgba(0, 212, 170, 0.4)' },
        { textShadow: '0 0 150px rgba(0, 212, 170, 0.7)', duration: 1.0, ease: 'sine.inOut' }, 0.7);

      window.__timelines['beat-5'] = tl;
    </script>
  </div>
</template>
