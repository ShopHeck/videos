  <script>

    // Celebration particles
    var canvas = document.getElementById("particles-05");
    var ctx = canvas.getContext("2d");
    function hashP5(x, y) { var n = x * 374761393 + y * 668265263; n = (n ^ (n >> 13)) * 1274126177; return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff; }
    function drawCelebration(t) {
      ctx.clearRect(0, 0, 1080, 1920);
      if (t < 0.5) return;
      var burstT = (t - 0.5) * 2;
      for (var i = 0; i < 40; i++) {
        var angle = hashP5(i, 0) * Math.PI * 2;
        var dist = burstT * (100 + hashP5(i, 1) * 300);
        var px = 540 + Math.cos(angle) * dist;
        var py = 820 + Math.sin(angle) * dist;
        var alpha = Math.max(0, 0.8 - burstT * 0.4);
        var size = 2 + hashP5(i, 2) * 3;
        if (px < 0 || px > 1080 || py < 0 || py > 1920) continue;
        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI * 2);
        var hue = hashP5(i, 3) > 0.5 ? "212,175,55" : "191,162,101";
        ctx.fillStyle = "rgba(" + hue + "," + alpha + ")";
        ctx.fill();
      }
    }
    var proxy05 = { time: 0 };
    tl.to(proxy05, { time: 4, duration: 4, ease: "none", onUpdate: function() { drawCelebration(proxy05.time); } }, 0);
