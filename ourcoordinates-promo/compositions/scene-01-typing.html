  <script>

    function hashP(x, y) { var n = x * 374761393 + y * 668265263; n = (n ^ (n >> 13)) * 1274126177; return ((n ^ (n >> 16)) & 0x7fffffff) / 0x7fffffff; }
    function drawParticles(t) {
      ctx.clearRect(0, 0, 1080, 1920);
      for (var i = 0; i < 40; i++) {
        var bx = hashP(i, 0) * 1080;
        var by = (hashP(i, 1) * 1920 + t * 30) % 1920;

        var size = 1.5 + hashP(i, 3) * 2.5;
        ctx.beginPath();
        ctx.arc(bx, by, size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(212,175,55," + alpha + ")";
        ctx.fill();
