<template id="beat-04-happiness-template">
  <div data-composition-id="beat-04-happiness" data-width="1080" data-height="1920" style="position:relative;width:1080px;height:1920px;overflow:hidden;background:#0a0a0a;">

    <!-- Gold burst background -->
    <div class="gold-burst" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1200px;height:1200px;border-radius:50%;background:radial-gradient(ellipse at center, rgba(212,175,55,0.14) 0%, rgba(212,175,55,0.04) 40%, transparent 70%);opacity:0;"></div>

    <!-- Product detail image with Ken Burns -->
    <div class="detail-wrap" style="position:absolute;inset:-40px;overflow:hidden;">
      <img class="detail-img" src="capture/assets/img-9343-1500x.jpg"
        style="width:100%;height:100%;object-fit:cover;filter:brightness(1.05) saturate(0.9);" />
    </div>

    <!-- Dark overlay for text readability -->
    <div class="overlay" style="position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.6) 100%);"></div>

    <!-- Gold particles burst -->
    <div class="particle-field" style="position:absolute;inset:0;overflow:hidden;">
      <div class="gp gp1" style="position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp2" style="position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
      <div class="gp gp3" style="position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp4" style="position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
      <div class="gp gp5" style="position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp6" style="position:absolute;top:50%;left:50%;width:2px;height:2px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
      <div class="gp gp7" style="position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp8" style="position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
      <div class="gp gp9" style="position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp10" style="position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
      <div class="gp gp11" style="position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:#d4af37;opacity:0;"></div>
      <div class="gp gp12" style="position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#e8c84a;opacity:0;"></div>
    </div>

    <!-- Text content -->
    <div class="text-content" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:120px 80px;">
      <div class="joy-headline" style="font-family:'Playfair Display',serif;font-weight:700;font-style:italic;font-size:68px;color:#f5f0e8;text-align:center;line-height:1.1;letter-spacing:-0.02em;text-shadow:0 2px 40px rgba(0,0,0,0.5);">Yours. Forever.</div>
      <div class="joy-coords" style="font-family:'RM Neue',serif;font-weight:600;font-style:italic;font-size:22px;color:#d4af37;letter-spacing:0.04em;text-shadow:0 0 30px rgba(212,175,55,0.5);">48.8566&deg; N, 2.3522&deg; E</div>
    </div>

    <style>
      @font-face { font-family: 'Playfair Display'; src: url('capture/assets/fonts/nuFRD-vYSZviVYUb_rj3ij__anPXDTnCjmHKM4nYO7KN_qiTbtY.ttf') format('truetype'); font-weight: 400; font-style: italic; }
      @font-face { font-family: 'Playfair Display'; src: url('capture/assets/fonts/nuFRD-vYSZviVYUb_rj3ij__anPXDTnCjmHKM4nYO7KN_k-UbtY.ttf') format('truetype'); font-weight: 700; font-style: italic; }
      @font-face { font-family: 'Inter'; src: url('capture/assets/fonts/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuOKfMZg.ttf') format('truetype'); font-weight: 300; font-style: normal; }
      @font-face { font-family: 'Inter'; src: url('capture/assets/fonts/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfMZg.ttf') format('truetype'); font-weight: 400; font-style: normal; }
      @font-face { font-family: 'Inter'; src: url('capture/assets/fonts/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuI6fMZg.ttf') format('truetype'); font-weight: 500; font-style: normal; }
      @font-face { font-family: 'RM Neue'; src: url('capture/assets/fonts/RMNeue-LightItalic.woff2') format('woff2'); font-weight: 300; font-style: italic; }
      @font-face { font-family: 'RM Neue'; src: url('capture/assets/fonts/RMNeue-SemiBoldItalic.woff2') format('woff2'); font-weight: 600; font-style: italic; }
      @font-face { font-family: 'RM Neue'; src: url('capture/assets/fonts/RMNeue-BoldItalic.woff2') format('woff2'); font-weight: 700; font-style: italic; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var BEAT = 4.8;
      var tl = gsap.timeline({ paused: true });

      // Gold burst expands then settles
      tl.fromTo(".gold-burst",
        { opacity: 0, scale: 0.3 },
        { opacity: 1, scale: 1.5, duration: 2.2, ease: "power2.out" },
        0.1
      );
      tl.to(".gold-burst",
        { opacity: 0.6, duration: 2.0, ease: "sine.inOut" },
        2.4
      );

      // Ken Burns on detail image
      tl.fromTo(".detail-img",
        { scale: 1.0 },
        { scale: 1.06, duration: BEAT, ease: "none" },
        0
      );

      // Detail wrap fade in
      tl.fromTo(".detail-wrap",
        { opacity: 0 },
        { opacity: 1, duration: 0.8, ease: "power2.out" },
        0.1
      );

      // Particle burst - each particle goes in a different direction
      var angles = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
      var distances = [180, 220, 160, 200, 240, 170, 210, 190, 230, 200, 180, 220];
      for (var i = 0; i < 12; i++) {
        var rad = angles[i] * Math.PI / 180;
        var dist = distances[i];
        var dx = Math.cos(rad) * dist;
        var dy = Math.sin(rad) * dist;
        tl.fromTo(".gp" + (i + 1),
          { opacity: 0, x: 0, y: 0 },
          { opacity: 0.8, x: dx * 0.5, y: dy * 0.5, duration: 0.4, ease: "power2.out" },
          0.3 + (i * 0.025)
        );
        tl.fromTo(".gp" + (i + 1),
          { opacity: 0.8, x: dx * 0.5, y: dy * 0.5 },
          { opacity: 0, x: dx, y: dy, duration: 1.6, ease: "power1.out" },
          0.7 + (i * 0.025)
        );
      }

      // Joy headline entrance
      tl.fromTo(".joy-headline",
        { opacity: 0, scale: 0.9 },
        { opacity: 1, scale: 1.0, duration: 0.9, ease: "power3.out" },
        0.5
      );

      // Headline subtle glow pulse
      tl.fromTo(".joy-headline",
        { textShadow: "0 2px 40px rgba(0,0,0,0.5)" },
        { textShadow: "0 2px 60px rgba(212,175,55,0.3)", duration: 2.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        1.4
      );

      // Coordinates entrance
      tl.fromTo(".joy-coords",
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.7, ease: "power2.out" },
        1.0
      );

      window.__timelines["beat-04-happiness"] = tl;
    </script>
  </div>
</template>
