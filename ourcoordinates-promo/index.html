<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0a0a0a;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1080" data-height="1920">

      <div id="beat-1" class="scene"
        data-composition-id="beat-01-hook"
        data-composition-src="compositions/beat-01-hook.html"
        data-start="0" data-duration="3.8"
        data-track-index="1"
        data-width="1080" data-height="1920">
      </div>

      <div id="beat-2" class="scene"
        data-composition-id="beat-02-nostalgia"
        data-composition-src="compositions/beat-02-nostalgia.html"
        data-start="2.2" data-duration="5.3"
        data-track-index="2"
        data-width="1080" data-height="1920">
      </div>

      <div id="beat-3" class="scene"
        data-composition-id="beat-03-product"
        data-composition-src="compositions/beat-03-product.html"
        data-start="6.5" data-duration="5.5"
        data-track-index="3"
        data-width="1080" data-height="1920">
      </div>

      <div id="beat-4" class="scene"
        data-composition-id="beat-04-happiness"
        data-composition-src="compositions/beat-04-happiness.html"
        data-start="11.2" data-duration="4.8"
        data-track-index="4"
        data-width="1080" data-height="1920">
      </div>

      <div id="beat-5" class="scene"
        data-composition-id="beat-05-cta"
        data-composition-src="compositions/beat-05-cta.html"
        data-start="15.2" data-duration="4.8"
        data-track-index="5"
        data-width="1080" data-height="1920">
      </div>

      <!-- SFX Audio -->
      <audio id="sfx-impact" data-start="0" data-duration="2.12" data-track-index="6" data-volume="0.3" src="sfx/impact-bass-1.mp3"></audio>
      <audio id="sfx-whoosh" data-start="2.5" data-duration="5.54" data-track-index="7" data-volume="0.2" src="sfx/whoosh-cinematic.mp3"></audio>
      <audio id="sfx-chime-1" data-start="7.0" data-duration="2.5" data-track-index="8" data-volume="0.35" src="sfx/chime.mp3"></audio>
      <audio id="sfx-chime-2" data-start="12.0" data-duration="2.5" data-track-index="9" data-volume="0.35" src="sfx/chime.mp3"></audio>
      <audio id="sfx-sparkle" data-start="16.0" data-duration="1.8" data-track-index="10" data-volume="0.35" src="sfx/sparkle.mp3"></audio>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
